    created: "2026-07-03T22:30:29.443685+03:00"
    description: Axera — Kubernetes microsegmentation and network detection & response
      (NDR) for OpenShift. Maps every east-west and egress flow, turns observed traffic
      into least-privilege NetworkPolicy, and triages incidents with on-prem AI. Runs
      entirely in-cluster; CNI-agnostic; strictly additive (observes first, enforces
      nothing until you choose). Supports all-internal (one-box) or external Postgres
      + Kafka + AI endpoints.
