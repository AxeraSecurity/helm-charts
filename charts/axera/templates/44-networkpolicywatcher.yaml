apiVersion: apps/v1
kind: Deployment
metadata:
  name: networkpolicywatcher
  namespace: {{ .Values.global.namespace }}
  labels:
    app: networkpolicywatcher
    {{- include "axera.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels: { app: networkpolicywatcher }
  template:
    metadata:
      labels: { app: networkpolicywatcher }
    spec:
      serviceAccountName: axera-sa
      {{- $waited := include "axera.waitForDb" . }}
      {{- if $waited }}
      initContainers:
        {{- $waited | nindent 8 }}
      {{- end }}
      containers:
        - name: networkpolicywatcher
          image: {{ include "axera.image" (dict "img" .Values.images.networkpolicywatcher "ctx" .) }}
          imagePullPolicy: Always
          ports:
            - { containerPort: 8080 }
          envFrom:
            - configMapRef: { name: axera-app-config }
            - secretRef: { name: axera-app-secret }
          env:
            - { name: ASPNETCORE_ENVIRONMENT, value: Production }
            - { name: ASPNETCORE_URLS, value: "http://+:8080" }
            - name: ConnectionStrings__DefaultConnection
              valueFrom: { secretKeyRef: { name: axera-db-secrets, key: APP_DB_CONNSTR } }
---
apiVersion: v1
kind: Service
metadata:
  name: networkpolicywatcher
  namespace: {{ .Values.global.namespace }}
  labels: {{- include "axera.labels" . | nindent 4 }}
spec:
  selector: { app: networkpolicywatcher }
  ports:
    - { name: http, port: 8080, targetPort: 8080 }
