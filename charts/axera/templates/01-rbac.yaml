apiVersion: v1
kind: ServiceAccount
metadata:
  name: axera-sa
  namespace: {{ .Values.global.namespace }}
  labels: {{- include "axera.labels" . | nindent 4 }}
{{- if .Values.imagePullSecret.enabled }}
imagePullSecrets:
  - name: {{ .Values.imagePullSecret.name }}
{{- end }}
---
{{- if and .Values.imagePullSecret.enabled .Values.imagePullSecret.dockerconfigjson }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.imagePullSecret.name }}
  namespace: {{ .Values.global.namespace }}
  labels: {{- include "axera.labels" . | nindent 4 }}
type: kubernetes.io/dockerconfigjson
data:
  .dockerconfigjson: {{ .Values.imagePullSecret.dockerconfigjson }}
---
{{- end }}
{{- if .Values.global.createSCC }}
apiVersion: security.openshift.io/v1
kind: SecurityContextConstraints
metadata:
  name: axera-scc
  labels: {{- include "axera.labels" . | nindent 4 }}
  annotations:
    kubernetes.io/description: "Microseg workloads - allows fixed/anyuid for postgres, kafka, .NET"
allowHostDirVolumePlugin: false
allowHostIPC: false
allowHostNetwork: false
allowHostPID: false
allowHostPorts: false
allowPrivilegeEscalation: true
allowPrivilegedContainer: false
allowedCapabilities: []
defaultAddCapabilities: []
fsGroup:
  type: RunAsAny
readOnlyRootFilesystem: false
requiredDropCapabilities:
  - KILL
  - MKNOD
  - SETUID
  - SETGID
runAsUser:
  type: RunAsAny
seLinuxContext:
  type: MustRunAs
supplementalGroups:
  type: RunAsAny
volumes:
  - configMap
  - downwardAPI
  - emptyDir
  - persistentVolumeClaim
  - projected
  - secret
users: []
groups: []
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: axera-scc-use
  labels: {{- include "axera.labels" . | nindent 4 }}
rules:
  - apiGroups: ["security.openshift.io"]
    resources: ["securitycontextconstraints"]
    resourceNames: ["axera-scc"]
    verbs: ["use"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: axera-scc-use
  namespace: {{ .Values.global.namespace }}
  labels: {{- include "axera.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: axera-scc-use
subjects:
  - kind: ServiceAccount
    name: axera-sa
    namespace: {{ .Values.global.namespace }}
---
# ----------------------------------------------------------------------------
# License module RBAC.
# API pod needs to:
#   1. List worker nodes (count vs license maxWorkerNodes)
#   2. Read ClusterVersion (config.openshift.io) for cluster UID binding
# ----------------------------------------------------------------------------
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: axera-license-reader
  labels: {{- include "axera.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["config.openshift.io"]
    resources: ["clusterversions"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: axera-license-reader-{{ .Values.global.namespace }}
  labels: {{- include "axera.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: axera-license-reader
subjects:
  - kind: ServiceAccount
    name: axera-sa
    namespace: {{ .Values.global.namespace }}
{{- end }}
