{{- /* =========================================================================
     Secrets — database, application, and Kafka.

     Every secret value resolves as:
       values override  >  existing Secret (stable across `helm upgrade`)  >  generated
     This keeps the chart safe to publish (no secrets committed) while still
     installing with zero configuration. Encryption keys MUST stay stable across
     upgrades or DataProtection-encrypted data becomes unreadable — hence the
     read-back from the existing Secret.
========================================================================= */ -}}
{{- $ns := .Values.global.namespace -}}
{{- $dbData  := (lookup "v1" "Secret" $ns "axera-db-secrets").data  | default dict -}}
{{- $appData := (lookup "v1" "Secret" $ns "axera-app-secret").data  | default dict -}}
{{- $pgPass := .Values.postgres.password -}}
{{- if not $pgPass }}{{- $pgPass = (index $dbData "POSTGRES_PASSWORD" | default "" | b64dec) -}}{{- end -}}
{{- if not $pgPass }}{{- $pgPass = randAlphaNum 24 -}}{{- end -}}
{{- $appConn := "" -}}
{{- $radarConn := "" -}}
{{- if .Values.postgres.external -}}
{{-   $appConn = .Values.postgres.appDbConnString -}}
{{-   $radarConn = .Values.postgres.radarConnString -}}
{{- else -}}
{{-   $appConn = printf "Host=postgres-app;Port=5432;Database=%s;Username=%s;Password=%s" .Values.postgres.appDbName .Values.postgres.user $pgPass -}}
{{-   $radarConn = printf "Host=postgres-radar;Port=5432;Database=%s;Username=%s;Password=%s" .Values.postgres.radarDbName .Values.postgres.user $pgPass -}}
{{- end -}}
{{- $ats := .Values.app.accessTokenSecret -}}
{{- if not $ats }}{{- $ats = (index $appData "AccessTokenSecret" | default "" | b64dec) -}}{{- end -}}
{{- if not $ats }}{{- $ats = randAlphaNum 64 -}}{{- end -}}
{{- $encKey := .Values.app.encryptionKey -}}
{{- if not $encKey }}{{- $encKey = (index $appData "Encryption__Key" | default "" | b64dec) -}}{{- end -}}
{{- if not $encKey }}{{- $encKey = randBytes 32 -}}{{- end -}}
{{- $encIV := .Values.app.encryptionIV -}}
{{- if not $encIV }}{{- $encIV = (index $appData "Encryption__IV" | default "" | b64dec) -}}{{- end -}}
{{- if not $encIV }}{{- $encIV = randBytes 16 -}}{{- end -}}
{{- $adminPass := .Values.app.adminPassword -}}
{{- if not $adminPass }}{{- $adminPass = (index $appData "AdminCredentials__Password" | default "" | b64dec) -}}{{- end -}}
{{- if not $adminPass }}{{- $adminPass = printf "%s!Aa1" (randAlphaNum 16) -}}{{- end -}}
{{- $intTok := .Values.app.internalToken -}}
{{- if not $intTok }}{{- $intTok = (index $appData "Internal__Token" | default "" | b64dec) -}}{{- end -}}
{{- if not $intTok }}{{- $intTok = randAlphaNum 48 -}}{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: axera-db-secrets
  namespace: {{ $ns }}
  labels: {{- include "axera.labels" . | nindent 4 }}
type: Opaque
stringData:
  POSTGRES_USER: {{ .Values.postgres.user | quote }}
  POSTGRES_PASSWORD: {{ $pgPass | quote }}
  APP_DB_NAME: {{ .Values.postgres.appDbName | quote }}
  RADAR_DB_NAME: {{ .Values.postgres.radarDbName | quote }}
  APP_DB_CONNSTR: {{ $appConn | quote }}
  RADAR_DB_CONNSTR: {{ $radarConn | quote }}
---
apiVersion: v1
kind: Secret
metadata:
  name: axera-app-secret
  namespace: {{ $ns }}
  labels: {{- include "axera.labels" . | nindent 4 }}
type: Opaque
stringData:
  AccessTokenSecret: {{ $ats | quote }}
  AdminCredentials__Username: {{ .Values.app.adminUsername | quote }}
  AdminCredentials__Email: {{ .Values.app.adminEmail | quote }}
  AdminCredentials__Password: {{ $adminPass | quote }}
  Encryption__Key: {{ $encKey | quote }}
  Encryption__IV: {{ $encIV | quote }}
  Internal__Token: {{ $intTok | quote }}
---
apiVersion: v1
kind: Secret
metadata:
  name: kafka-external-secret
  namespace: {{ $ns }}
  labels: {{- include "axera.labels" . | nindent 4 }}
type: Opaque
stringData:
  KafkaServer: {{ include "axera.kafkaBootstrap" . | quote }}
  Kafka__BootstrapServers: {{ include "axera.kafkaBootstrap" . | quote }}
  Kafka__SecurityProtocol: {{ include "axera.kafkaSecurityProtocol" . | quote }}
  Kafka__SaslMechanism: {{ .Values.kafka.saslMechanism | quote }}
  Kafka__SaslUsername: {{ .Values.kafka.saslUsername | quote }}
  Kafka__SaslPassword: {{ .Values.kafka.saslPassword | quote }}
  # If caCert is provided, point librdkafka to the mounted file; else leave empty
  # so it falls back to the system CA bundle.
  Kafka__SslCaLocation: {{ if .Values.kafka.caCert }}"/etc/kafka-certs/ca.crt"{{ else }}""{{ end }}
  ca.crt: {{ .Values.kafka.caCert | quote }}
