{{- /*
  Helm test: verifies the API Service answers on its cluster-internal port.
  Run after install/upgrade with:  helm test <release> -n <namespace>
  Satisfies the chart-verifier "contains-test" requirement.
*/ -}}
apiVersion: v1
kind: Pod
metadata:
  name: "{{ .Release.Name }}-test-connection"
  namespace: {{ .Values.global.namespace }}
  labels:
    app: axera-test
    {{- include "axera.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
    # Pin the built-in restricted-v2 SCC (OCP 4.14+). Without this, a cluster that
    # has a higher-priority permissive SCC (e.g. a leftover eBPF/flow-agent SCC with
    # RunAsAny) can capture the default ServiceAccount and leave the ubi-minimal image
    # running as root, which the kubelet rejects (runAsNonRoot). restricted-v2 uses
    # MustRunAsRange and injects a valid non-root UID from the namespace range.
    "openshift.io/required-scc": "restricted-v2"
spec:
  # Use the namespace default ServiceAccount (not axera-sa): the test only needs
  # network reach to the api Service, no RBAC. On OpenShift the default SA maps to
  # the restricted-v2 SCC, which injects a non-root UID from the namespace range so
  # runAsNonRoot below is satisfied. Binding axera-sa (RunAsAny SCC) would leave the
  # ubi-minimal image running as root and the kubelet would reject the pod.
  automountServiceAccountToken: false
  restartPolicy: Never
  containers:
    - name: connection-test
      image: registry.access.redhat.com/ubi9/ubi-minimal:latest
      command: ["/bin/sh", "-c"]
      args:
        - |
          set -e
          echo "Checking API service at http://api:8080 ..."
          curl --silent --show-error --output /dev/null --max-time 15 \
               --retry 5 --retry-delay 5 --retry-connrefused http://api:8080
          echo "OK: api service is reachable."
      securityContext:
        allowPrivilegeEscalation: false
        runAsNonRoot: true
        capabilities:
          drop: ["ALL"]
        seccompProfile:
          type: RuntimeDefault
