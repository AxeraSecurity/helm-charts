{{- if not .Values.postgres.external }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres-radar
  namespace: {{ .Values.global.namespace }}
  labels:
    app: postgres-radar
    {{- include "axera.labels" . | nindent 4 }}
spec:
  serviceName: postgres-radar
  replicas: 1
  selector:
    matchLabels: { app: postgres-radar }
  template:
    metadata:
      labels: { app: postgres-radar }
    spec:
      serviceAccountName: axera-sa
      {{- if .Values.global.createSCC }}
      # axera-scc uses fsGroup: RunAsAny, so OpenShift won't auto-assign one — set it
      # explicitly so the Red Hat postgresql image (arbitrary UID) can write the data
      # PVC. Under the default restricted SCC (createSCC=false), fsGroup is MustRunAs
      # and OpenShift assigns an in-range GID, so we omit it there.
      securityContext:
        fsGroup: 26
      {{- end }}
      containers:
        - name: postgres
          image: {{ include "axera.image" (dict "img" .Values.images.postgres "ctx" .) }}
          ports:
            - { containerPort: 5432, name: postgres }
          env:
            # Red Hat sclorg postgresql image conventions. Apps + migrate jobs connect
            # as the 'postgres' superuser (password = ADMIN_PASSWORD); the required
            # non-superuser account owns the auto-created database.
            - name: POSTGRESQL_DATABASE
              valueFrom: { secretKeyRef: { name: axera-db-secrets, key: RADAR_DB_NAME } }
            - { name: POSTGRESQL_USER, value: axera_app }
            - name: POSTGRESQL_PASSWORD
              valueFrom: { secretKeyRef: { name: axera-db-secrets, key: POSTGRES_PASSWORD } }
            - name: POSTGRESQL_ADMIN_PASSWORD
              valueFrom: { secretKeyRef: { name: axera-db-secrets, key: POSTGRES_PASSWORD } }
          volumeMounts:
            - { name: data, mountPath: /var/lib/pgsql/data }
          readinessProbe:
            exec: { command: ["pg_isready", "-U", "postgres"] }
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            exec: { command: ["pg_isready", "-U", "postgres"] }
            initialDelaySeconds: 30
            periodSeconds: 20
          resources: {{- toYaml .Values.resources.postgres | nindent 12 }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: [ReadWriteOnce]
        storageClassName: {{ .Values.global.storageClass }}
        resources:
          requests:
            storage: {{ .Values.postgres.storage }}
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-radar
  namespace: {{ .Values.global.namespace }}
  labels: {{- include "axera.labels" . | nindent 4 }}
spec:
  selector: { app: postgres-radar }
  ports:
    - { name: postgres, port: 5432, targetPort: 5432 }
{{- end }}
